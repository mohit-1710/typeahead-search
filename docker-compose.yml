# Local infra: one Postgres (source of truth) + three Redis nodes (the
# distributed cache). The app routes cache keys across the three by consistent
# hashing — they are independent servers, not a Redis Cluster, so the routing
# logic lives in our own code.
#
# Eviction is volatile-lru: only keys with a TTL (the suggestion cache) can be
# evicted. The write-ahead list and the trending sorted set carry no TTL, so
# they survive memory pressure. appendonly keeps them across a restart, which is
# what makes the write buffer crash-safe.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ta_postgres
    environment:
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
      POSTGRES_DB: typeahead
    ports:
      - "5433:5432"
    volumes:
      - ta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeahead -d typeahead"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis-1:
    image: redis:7-alpine
    container_name: ta_redis_1
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "7001:6379"
    volumes:
      - ta_redis_1:/data

  redis-2:
    image: redis:7-alpine
    container_name: ta_redis_2
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "7002:6379"
    volumes:
      - ta_redis_2:/data

  redis-3:
    image: redis:7-alpine
    container_name: ta_redis_3
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "7003:6379"
    volumes:
      - ta_redis_3:/data

volumes:
  ta_pg:
  ta_redis_1:
  ta_redis_2:
  ta_redis_3:
